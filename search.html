<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Engine Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        /* Logo */
        .logo {
            font-size: 2.5rem;
            color: #4285f4;
            margin-bottom: 20px;
        }

        /* Search Bar */
        .search-bar {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
        }

        .search-bar input[type="text"] {
            flex: 1;
            border: none;
            padding: 10px;
            font-size: 1rem;
            border-radius: 50px;
            outline: none;
        }

        .search-bar button {
            background-color: #4285f4;
            border: none;
            color: #fff;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.3s ease;
        }

        .search-bar button:hover {
            background-color: #357ae8;
        }

        /* Links */
        .links {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            font-size: 0.9rem;
        }

        .links a {
            color: #555;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            .search-bar {
                flex-direction: column;
                padding: 5px;
            }

            .search-bar input[type="text"] {
                margin-bottom: 10px;
                width: 100%;
                box-sizing: border-box;
            }

            .search-bar button {
                width: 100%;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="logo">SearchIt</div>

    <div class="search-bar">
        <input type="text" placeholder="Search the web..." aria-label="Search input">
        <button>Search</button>
    </div>

    <div class="links">
        <a href="#">About</a>
        <a href="#">Privacy</a>
        <a href="#">Settings</a>
    </div>
</body>
</html>
